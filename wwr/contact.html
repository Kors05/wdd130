<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | The Rapids Rafting Company</title>
  <meta name="description"
    content="Get in touch with The Rapids Rafting Company. Contact us for reservations, questions, or trip information. Find our location, send a message, or connect with our team.">
  <meta name="author" content="Emmanuel Eze">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <img src="images/logo.jpg" alt="the rapids logo" width="100">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html"> About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="company-info">
      <h1>The Rapids Rafting Company</h1>
      <p>123 Main River Street</p>
      <p>Kolob, California</p>
      <p>+1 999 999 9999</p>
      <p>admin@rapids.com</p>
    </section>
    <section class="contact-grid">
      <div class="map">
        <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed" height="300"
          loading="lazy">
        </iframe>
      </div>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <div class="radio-group">
          <p>Message Purpose</p>

          <div class="radio-option">
            <input type="radio" id="general" name="purpose" value="general" required>
            <label for="general">General Inquiry</label>
          </div>

          <div class="radio-option">
            <input type="radio" id="reservation" name="purpose" value="reservation">
            <label for="reservation">Reservation Question</label>
          </div>

          <div class="radio-option">
            <input type="radio" id="suggestion" name="purpose" value="suggestion">
            <label for="suggestion">Website Suggestion</label>
          </div>
        </div>

        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>

        <div class="checkbox-group">
          <input type="checkbox" id="subscribe" name="subscribe">
          <label for="subscribe">Please subscribe me to the monthly newsletter</label>
        </div>
        <button type="submit">Get in Touch!</button>
      </form>
    </section>
    <section class="team">
      <h2>We Are Here to Serve You</h2>
      <div class="team-members">
        <figure>
          <img src="images/employee1.jpg" alt="employee">
          <figcaption>Employee Profile</figcaption>
        </figure>

        <figure>
          <img src="images/employee2.jpg" alt="employee">
          <figcaption>Employee Profile</figcaption>
        </figure>

        <figure>
          <img src="images/employee3.jpg" alt="employee">
          <figcaption>Employee Profile</figcaption>
        </figure>
      </div>
    </section>
  </main>
  <footer>
    <p>&copy;2026 💙 The Rapids Rafting Company 💙 Emmanuel Eze</p>
    <nav class="socialmedia">
      <a href="https://www.facebook.com/">
        <img src="images/facebook.svg" alt="Facebook Icon" width="50">
      </a>
      <a href="https://www.linkedin.com/">
        <img src="images/linkedin.svg" alt="LinkedIn Icon" width="50">
      </a>
      <a href="https://www.instagram.com/">
        <img src="images/instagram.svg" alt="Instagram Icon" width="50">
      </a>
    </nav>
  </footer>
</body>

</html>
